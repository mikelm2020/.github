name: GGA — AI Code Review (reusable)

on:
  workflow_call:

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar GGA
        run: |
          git clone https://github.com/Gentleman-Programming/gentleman-guardian-angel.git /tmp/gga
          chmod +x /tmp/gga/bin/gga
          echo "/tmp/gga/bin" >> $GITHUB_PATH

      - name: Instalar opencode
        run: npm install -g opencode-ai

      - name: Crear rama local main para diff
        run: git fetch origin main:main

      - name: Ejecutar revisión de código
        id: gga
        run: |
          set +e
          gga run --pr-mode 2>&1 | tee /tmp/gga-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          sed -i 's/\x1b\[[0-9;]*m//g' /tmp/gga-output.txt
          exit $EXIT_CODE

      - name: Publicar violaciones en el PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## 🤖 GGA — Revisión de código"
            echo ""
            echo "❌ Se encontraron violaciones que deben corregirse antes del merge."
            echo ""
            echo '```'
            cat /tmp/gga-output.txt
            echo '```'
            echo ""
            echo "> Corrige las violaciones anteriores y vuelve a hacer push."
          } > /tmp/pr-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/pr-comment.md
